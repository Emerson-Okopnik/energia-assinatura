<!doctype html>
<!-- @dsCard group="Components" name="Cards" subtitle="Default + selected audience card" viewport="700x230" --><html><head><meta charset="utf-8"><title>Card</title>
<link rel="stylesheet" href="_base.css">
<style>
  body { padding: 22px; background: var(--color-linen); display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
  .card { background: white; border-radius: 20px; padding: 18px; box-shadow: var(--shadow-sm); display: flex; flex-direction: column; gap: 10px; }
  .eye { font-family: var(--font-body); font-weight: 700; font-size: 11px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--color-primary-deep); }
  .title { font-family: var(--font-display); font-weight: 800; font-size: 18px; color: var(--color-ink); line-height: 1.15; }
  .body { font-family: var(--font-body); font-size: 13px; line-height: 1.55; color: var(--color-graphite); }
  .selected { border: 2px solid var(--color-primary-warm); }
  .chip { align-self: flex-start; background: var(--color-primary-soft); color: var(--color-primary-deep); font-weight: 700; font-size: 11px; padding: 4px 10px; border-radius: 999px; }
</style>
</head><body>
  <div class="card">
    <span class="eye">Para você</span>
    <div class="title">Economize até 28% na sua conta de luz</div>
    <div class="body">Sem obras, sem placas. Energia limpa e legal direto na sua fatura.</div>
  </div>
  <div class="card selected">
    <span class="chip">Selecionado</span>
    <div class="title">Para usineiros e investidores</div>
    <div class="body">Receita previsível da sua geração excedente, com segurança jurídica (Lei 14.300/22).</div>
  </div>
</body></html>
