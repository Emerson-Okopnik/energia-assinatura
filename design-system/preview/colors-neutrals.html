<!doctype html>
<!-- @dsCard group="Colors" name="Colors · Neutrals" subtitle="Warm neutral scale from Paper to Ink" viewport="700x180" --><html><head><meta charset="utf-8"><title>Colors · Neutrals</title>
<link rel="stylesheet" href="_base.css">
<style>
  body { padding: 24px; }
  .row { display: grid; grid-template-columns: repeat(6, 1fr); gap: 10px; }
  .swatch { border-radius: 12px; padding: 12px; height: 120px; display: flex; flex-direction: column; justify-content: space-between; box-shadow: var(--shadow-xs); }
  .name { font-family: var(--font-display); font-weight: 800; font-size: 12px; }
  .hex { font-family: var(--font-mono); font-size: 10px; opacity: 0.9; }
</style>
</head><body>
  <div class="row">
    <div class="swatch" style="background:#fff;color:var(--color-ink);border:1px solid var(--color-mist)"><div class="name">Paper</div><div class="hex">#FFFFFF</div></div>
    <div class="swatch" style="background:var(--color-linen);color:var(--color-ink)"><div class="name">Linen</div><div class="hex">#FAF6F1</div></div>
    <div class="swatch" style="background:var(--color-mist);color:var(--color-ink)"><div class="name">Mist</div><div class="hex">#E5E0D9</div></div>
    <div class="swatch" style="background:var(--color-smoke);color:white"><div class="name">Smoke</div><div class="hex">#B0B0B0</div></div>
    <div class="swatch" style="background:var(--color-graphite);color:white"><div class="name">Graphite</div><div class="hex">#5C5C5C</div></div>
    <div class="swatch" style="background:var(--color-ink);color:white"><div class="name">Ink</div><div class="hex">#3D3D3D</div></div>
  </div>
</body></html>
