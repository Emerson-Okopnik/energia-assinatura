<!doctype html>
<!-- @dsCard group="Type" name="Type · Eyebrow, CTA, Mono" subtitle="Supporting type styles" viewport="700x220" --><html><head><meta charset="utf-8"><title>Type · Eyebrow + Mono</title>

<style>

</style>
</head><body>
  <div class="block"><div><span class="tag">Eyebrow</span></div><div class="eyebrow">Sobre nós</div></div>
