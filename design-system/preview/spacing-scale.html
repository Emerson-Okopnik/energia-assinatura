<!doctype html>
<!-- @dsCard group="Spacing" name="Spacing · 4px Scale" subtitle="4 / 8 / 12 / 16 / 24 / 32 / 48 / 64 / 96" viewport="700x280" --><html><head><meta charset="utf-8"><title>Spacing · Scale</title>
<link rel="stylesheet" href="_base.css">
<style>
  body { padding: 24px 28px; display: flex; flex-direction: column; gap: 7px; justify-content: center; }
  .row { display: grid; grid-template-columns: 48px 1fr 60px; align-items: center; gap: 12px; }
  .tag { font-family: var(--font-mono); font-size: 10px; color: var(--color-slate); }
  .bar { height: 12px; background: var(--color-primary); border-radius: 3px; }
  .px { font-family: var(--font-mono); font-size: 10px; color: var(--color-graphite); text-align: right; }
</style>
</head><body>
  <div class="row"><span class="tag">--1</span><div class="bar" style="width:4px"></div><span class="px">4px</span></div>
  <div class="row"><span class="tag">--2</span><div class="bar" style="width:8px"></div><span class="px">8px</span></div>
  <div class="row"><span class="tag">--3</span><div class="bar" style="width:12px"></div><span class="px">12px</span></div>
  <div class="row"><span class="tag">--4</span><div class="bar" style="width:16px"></div><span class="px">16px</span></div>
  <div class="row"><span class="tag">--6</span><div class="bar" style="width:24px"></div><span class="px">24px</span></div>
  <div class="row"><span class="tag">--7</span><div class="bar" style="width:32px"></div><span class="px">32px</span></div>
  <div class="row"><span class="tag">--9</span><div class="bar" style="width:48px"></div><span class="px">48px</span></div>
  <div class="row"><span class="tag">--10</span><div class="bar" style="width:64px"></div><span class="px">64px</span></div>
  <div class="row"><span class="tag">--12</span><div class="bar" style="width:96px"></div><span class="px">96px</span></div>
</body></html>
