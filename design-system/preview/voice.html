<!doctype html>
<!-- @dsCard group="Brand" name="Voice · Do & Don't" subtitle="On-brand vs off-brand copy" viewport="700x200" --><html><head><meta charset="utf-8"><title>Content voice</title>
<link rel="stylesheet" href="_base.css">
<style>
  body { padding: 22px 26px; display: flex; flex-direction: column; gap: 10px; justify-content: center; }
  .row { display: grid; grid-template-columns: 28px 1fr; gap: 12px; align-items: baseline; }
  .tag { font-family: var(--font-mono); font-size: 13px; font-weight: 700; }
  .yes { color: var(--color-success); }
  .no { color: var(--color-danger); }
  .txt { font-family: var(--font-body); font-size: 14px; line-height: 1.45; color: var(--color-ink); }
  .txt.off { color: var(--color-slate); text-decoration: line-through; text-decoration-color: rgba(197,59,47,0.4); }
</style>
</head><body>
  <div class="row"><span class="tag yes">✓</span><div class="txt">Economize até 28% na sua conta de luz sem precisar instalar nada.</div></div>
  <div class="row"><span class="tag yes">✓</span><div class="txt">Energia limpa, prática e regulamentada pela ANEEL.</div></div>
  <div class="row"><span class="tag no">✗</span><div class="txt off">🌟 Unlock the power of the sun! Join the solar revolution ✨</div></div>
  <div class="row"><span class="tag no">✗</span><div class="txt off">Nossa solução 360° é uma experiência disruptiva.</div></div>
</body></html>
