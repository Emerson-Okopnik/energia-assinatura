<!doctype html>
<!-- @dsCard group="Spacing" name="Elevation · Shadows" subtitle="Warm-tinted soft shadows + orange glow" viewport="700x190" --><html><head><meta charset="utf-8"><title>Shadow · Elevation</title>
<link rel="stylesheet" href="_base.css">
<style>
  body { padding: 30px 24px; display: flex; align-items: center; justify-content: space-around; gap: 14px; background: var(--color-linen); }
  .tile { width: 100px; height: 100px; background: white; border-radius: 16px; display: flex; align-items: flex-end; justify-content: center; padding-bottom: 10px; }
  .name { font-family: var(--font-display); font-weight: 700; font-size: 11px; color: var(--color-ink); }
  .xs { box-shadow: var(--shadow-xs); }
  .sm { box-shadow: var(--shadow-sm); }
  .md { box-shadow: var(--shadow-md); }
  .lg { box-shadow: var(--shadow-lg); }
  .glow { box-shadow: var(--shadow-glow); background: var(--color-primary); }
  .glow .name { color: white; }
</style>
</head><body>
  <div class="tile xs"><span class="name">xs</span></div>
  <div class="tile sm"><span class="name">sm</span></div>
  <div class="tile md"><span class="name">md</span></div>
  <div class="tile lg"><span class="name">lg</span></div>
  <div class="tile glow"><span class="name">glow</span></div>
</body></html>
