<!doctype html>
<!-- @dsCard group="Colors" name="Colors · Primary" subtitle="Líder Orange family — Sand → Apricot → Orange → Ember" viewport="700x200" --><html><head><meta charset="utf-8"><title>Colors · Primary</title>
<link rel="stylesheet" href="_base.css">
<style>
  body { padding: 24px; }
  .row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; }

  .s2 { background: var(--color-primary-warm); color: #6b3b0a; }

  .s4 { background: var(--color-primary-deep); color: white; }
</style>
</head><body>
  <div class="row">
    <div class="swatch s1"><div><div class="role">Soft</div><div class="name">Sand</div></div><div class="hex">#FDE6CB</div></div>
    <div class="swatch s2"><div><div class="role">Warm</div><div class="name">Apricot</div></div><div class="hex">#F9B566</div></div>
    <div class="swatch s3"><div><div class="role">Primary</div><div class="name">Líder Orange</div></div><div class="hex">#F39325</div></div>

  </div>
</body></html>
